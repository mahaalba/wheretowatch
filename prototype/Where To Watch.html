  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {

        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

      // which transformScriptTags handles unconditionally.

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

ick(id, side) {\n    this.setState(s => ({ picks: { ...s.picks, [id]: s.picks[id] === side ? null : side } }));\n  }\n\n  cover(hue) {\n    return `repeating-linear-gradient(135deg, hsl(${hue},42%,16%), hsl(${hue},42%,16%) 16px, hsl(${hue},38%,22%) 16px, hsl(${hue},38%,22%) 32px)`;\n  }\n\n  renderVals() {\n    const narrow = this.state.vw < 900;\n    const am = this.state.activeMatch;\n    const ar = this.state.area;\n    const filters = this.state.filters;\n    const fk = Object.keys(filters);\n    const featuredFirst = this.props.featuredFirst ?? true;\n    const showCrowd = this.props.showCrowdBacking ?? true;\n\n    let list = this.venuesData.filter(v =>\n      (am === 'all' || v.matchKey === am) &&\n      (ar === 'all' || v.neigh === ar) &&\n      fk.every(k => v.featureKeys.includes(k))\n    );\n    if (featuredFirst) {\n      list = [...list].sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));\n    }\n\n    const pillBase = 'display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 11px;font-family:Inter;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.2px;';\n    const pillSel = pillBase + 'background:#FFB22E;color:#0A1A33;border:1.5px solid #FFB22E;';\n    const pillOff = pillBase + 'background:#fff;color:#0A1A33;border:1.5px solid rgba(10,26,51,0.16);';\n\n    const venues = list.map((v, i) => {\n      const pick = this.state.picks[v.id];\n      let h = v.crowd.home.pct;\n      if (pick === 'home') h = Math.min(94, h + 4);\n      else if (pick === 'away') h = Math.max(6, h - 4);\n      const a = 100 - h;\n      const isActive = this.state.active === v.id;\n      return {\n        ...v,\n        mapNum: i + 1,\n        cardStyle: `background:#fff;border:1px solid ${isActive ? '#00B368' : 'rgba(10,26,51,0.08)'};border-radius:20px;overflow:hidden;box-shadow:${isActive ? '0 0 0 3px rgba(0,179,104,0.2),0 8px 24px rgba(10,26,51,0.08)' : '0 8px 24px rgba(10,26,51,0.05)'};margin-bottom:18px;transition:box-shadow .2s,border-color .2s`,\n        coverStyle: `position:relative;height:188px;background:${this.cover(v.cover)}`,\n        capacityStyle: `font-size:12px;font-weight:700;border-radius:8px;padding:5px 10px;color:${this.capColors[v.capacity].color};background:${this.capColors[v.capacity].background}`,\n        homeBarStyle: `width:${h}%;background:#00B368`,\n        awayBarStyle: `width:${a}%;background:#0A1A33`,\n        homePct: h,\n        awayPct: a,\n        homePillStyle: pick === 'home' ? pillSel : pillOff,\n        awayPillStyle: pick === 'away' ? pillSel : pillOff,\n        pickLabel: pick === 'home' ? `You're backing ${v.crowd.home.name}` : pick === 'away' ? `You're backing ${v.crowd.away.name}` : '',\n        pickLabelStyle: 'font-size:12px;font-weight:600;color:#0A6B45',\n        onHome: () => this.pick(v.id, 'home'),\n        onAway: () => this.pick(v.id, 'away'),\n      };\n    });\n\n    const pins = list.map((v, i) => {\n      const isActive = this.state.active === v.id;\n      const bg = v.featured ? '#FFB22E' : '#00B368';\n      return {\n        num: i + 1,\n        onClick: () => this.setState(s => ({ active: s.active === v.id ? null : v.id })),\n        style: `position:absolute;left:${v.mx}%;top:${v.my}%;transform:translate(-50%,-50%) scale(${isActive ? 1.25 : 1});width:30px;height:30px;border-radius:999px;background:${bg};color:#0A1A33;border:2px solid #0A1A33;font-family:Inter;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 ${isActive ? 6 : 0}px rgba(255,178,46,0.3),0 4px 10px rgba(0,0,0,0.35);transition:transform .15s,box-shadow .15s;z-index:${isActive ? 5 : 2}`,\n      };\n    });\n\n    const chips = this.chipsData.map(c => {\n      const active = !!filters[c.key];\n      return {\n        label: c.label,\n        onClick: () => this.toggleFilter(c.key),\n        style: `white-space:nowrap;border-radius:999px;padding:9px 15px;font-family:Inter;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid ${active ? '#0A1A33' : 'rgba(10,26,51,0.16)'};background:${active ? '#0A1A33' : '#fff'};color:${active ? '#fff' : '#0A1A33'}`,\n      };\n    });\n\n    const fixtures = this.fixturesData.map(fx => ({\n      ...fx,\n      badgeLabel: fx.late ? 'Late' : 'Tonight',\n      badgeStyle: fx.late\n        ? 'font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;border-radius:999px;padding:3px 8px;background:rgba(255,178,46,0.2);color:#FFD27A'\n        : 'font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;border-radius:999px;padding:3px 8px;background:rgba(0,179,104,0.18);color:#7CF0BE',\n    }));\n\n    const splitStyle = `display:flex;gap:28px;align-items:flex-start;${narrow ? 'flex-direction:column' : ''}`;\n    const leftColStyle = narrow ? 'width:100%' : 'flex:1;min-width:0';\n    const rightColStyle = narrow\n      ? 'width:100%;height:380px'\n      : 'width:40%;max-width:520px;position:sticky;top:88px;height:calc(100vh - 110px)';\n\n    const mkOpt = (o, extra) => React.createElement('option', Object.assign({ key: o.value, value: o.value }, extra || {}), o.label);\n\n    return {\n      area: ar,\n      activeMatch: am,\n      areaOptionEls: this.areaOptions.map(o => mkOpt(o)),\n      matchOptionEls: this.matchOptions.map(o => mkOpt(o)),\n      matchOptionElsDark: this.matchOptions.map(o => mkOpt(o, { style: { color: '#0A1A33' } })),\n      onMatchChange: (e) => this.setState({ activeMatch: e.target.value }),\n      onAreaChange: (e) => this.setState({ area: e.target.value }),\n      fixtures,\n      chips,\n      venues,\n      pins,\n      count: list.length,\n      showCrowd,\n      splitStyle,\n      leftColStyle,\n      rightColStyle,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
